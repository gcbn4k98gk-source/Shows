<!DOCTYPE html>
<html lang="fr"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Series Ranking V3</title>
<style>
body{font-family:system-ui;background:#0f1115;color:#eee;max-width:1200px;margin:auto;padding:16px}
.card{background:#1b1f27;padding:14px;border-radius:12px;margin:12px 0}
input{width:100%;padding:8px;margin:4px 0}
button{padding:8px 12px;margin:3px;border-radius:8px;border:0;cursor:pointer}
.win{background:#2563eb;color:#fff}.tie{background:#666;color:#fff}
.diff{background:#333;color:#fff}.danger{background:#b91c1c;color:#fff}
table{width:100%;border-collapse:collapse}td,th{border:1px solid #444;padding:6px}
.progress{height:18px;background:#333;border-radius:9px;overflow:hidden}.bar{height:100%;background:#2563eb}
</style></head><body>
<h1>Series Ranking V3</h1>
<div class="card">
<h3>Séries</h3><div id="series"></div><button onclick="addSeries()">+ Série</button>
<h3>Critères</h3><div id="criteria"></div><button onclick="addCriterion()">+ Critère</button>
<br><br>
<button onclick="saveCfg()">💾 Sauvegarder</button>
<button onclick="start()">▶ Commencer/Reprendre</button>
<button class="danger" onclick="resetAll()">Reset</button>
<button onclick="exportData()">Export JSON</button>
<input type="file" id="importFile" onchange="importData(event)">
</div>
<div id="battle"></div><div id="results"></div>
<script>
let S=JSON.parse(localStorage.getItem("sr_series")||'["BB","BCS","Dark","AOT","Mr. Robot","JJBA"]');
let C=JSON.parse(localStorage.getItem("sr_criteria")||'["Plot","Ending"]');
let st=JSON.parse(localStorage.getItem("sr_state")||"null");
const D={"Neg Diff":[11,0],"No Diff":[10,0],"Low Diff":[9,1],"Mid Diff":[8,2],"High Diff":[7,3],"Extreme Diff":[6,4]};
const pairs=a=>{let p=[];for(let i=0;i<a.length;i++)for(let j=i+1;j<a.length;j++)p.push([a[i],a[j]]);return p;}
function saveCfg(){localStorage.setItem("sr_series",JSON.stringify(S));localStorage.setItem("sr_criteria",JSON.stringify(C));render();}
function render(){
document.getElementById("series").innerHTML=S.map((x,i)=>`<div><input value="${x}" onchange="S[${i}]=this.value"><button class='danger' onclick='S.splice(${i},1);render()'>❌</button></div>`).join("");
document.getElementById("criteria").innerHTML=C.map((x,i)=>`<div><input value="${x}" onchange="C[${i}]=this.value"><button class='danger' onclick='C.splice(${i},1);render()'>❌</button></div>`).join("");
}
function addSeries(){S.push("Nouvelle Série");render()}
function addCriterion(){C.push("Nouveau Critère");render()}
function start(){
saveCfg();
if(!st){st={totals:{},perCrit:{},h2h:{},crit:0,pair:0};
S.forEach(s=>st.totals[s]=0);
C.forEach(c=>{st.perCrit[c]={};S.forEach(s=>st.perCrit[c][s]=0);});
}
battle();
}
function choose(w){st.w=w;battle()}
function apply(diff){
let [a,b]=pairs(S)[st.pair]; let sa,sb;
if(diff==="Tie"){sa=5;sb=5;} else {[sa,sb]=D[diff]; if(st.w===b){let t=sa;sa=sb;sb=t;}}
st.totals[a]+=sa; st.totals[b]+=sb;
let crit=C[st.crit]; st.perCrit[crit][a]+=sa; st.perCrit[crit][b]+=sb;
let k=a+" vs "+b; if(!st.h2h[k]) st.h2h[k]=[0,0]; st.h2h[k][0]+=sa; st.h2h[k][1]+=sb;
st.pair++; if(st.pair>=pairs(S).length){st.pair=0;st.crit++;}
localStorage.setItem("sr_state",JSON.stringify(st));
st.w=null;
if(st.crit>=C.length)return results();
battle();
}
function battle(){
if(st && st.crit>=C.length)return results();
let p=pairs(S), t=C.length*p.length, n=st.crit*p.length+st.pair+1, [a,b]=p[st.pair];
document.getElementById("battle").innerHTML=`<div class='card'><h2>${C[st.crit]}</h2><p>${n}/${t}</p><div class='progress'><div class='bar' style='width:${(n/t)*100}%'></div></div>
<button class='win' onclick="choose('${a}')">${a}</button>
<button class='win' onclick="choose('${b}')">${b}</button>
<button class='tie' onclick="apply('Tie')">Tie</button>
<p>Gagnant: ${st.w||"Aucun"}</p>
${Object.keys(D).map(x=>`<button class='diff' ${!st.w?"disabled":""} onclick="apply('${x}')">${x}</button>`).join("")}</div>`;
}
function results(){
let r=Object.entries(st.totals).sort((a,b)=>b[1]-a[1]);
let h="<div class='card'><h2>Classement Global</h2><table><tr><th>Série</th><th>Points</th></tr>";
r.forEach(x=>h+=`<tr><td>${x[0]}</td><td>${x[1]}</td></tr>`); h+="</table>";
h+="<h2>Classements par critère</h2>";
for(let c in st.perCrit){let rr=Object.entries(st.perCrit[c]).sort((a,b)=>b[1]-a[1]); h+=`<h3>${c}</h3><table>`;
rr.forEach(x=>h+=`<tr><td>${x[0]}</td><td>${x[1]}</td></tr>`); h+="</table>";}
h+="<h2>Head-to-Head</h2><table>";
for(let k in st.h2h)h+=`<tr><td>${k}</td><td>${st.h2h[k][0]} - ${st.h2h[k][1]}</td></tr>`;
h+="</table></div>";
document.getElementById("battle").innerHTML=""; document.getElementById("results").innerHTML=h;
}
function exportData(){
let blob=new Blob([JSON.stringify({S,C,st},null,2)],{type:"application/json"});
let a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="series-ranking.json"; a.click();
}
function importData(e){
let f=e.target.files[0]; if(!f)return;
let r=new FileReader(); r.onload=()=>{let d=JSON.parse(r.result); S=d.S; C=d.C; st=d.st; saveCfg(); localStorage.setItem("sr_state",JSON.stringify(st)); render(); alert("Importé");}; r.readAsText(f);
}
function resetAll(){localStorage.removeItem("sr_state"); st=null; location.reload();}
render(); if(st) battle();
</script></body></html>
